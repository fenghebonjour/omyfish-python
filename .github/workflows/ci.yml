name: CI

on:
  push:
  pull_request:
  schedule:
    # Weekly run on main — catches dependency drift (e.g. torch resolving to
    # new CUDA wheels) even when no code changes.
    - cron: "0 6 * * 1"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight deps
        run: pip install pyyaml

      - name: Validate configs and metadata
        run: |
          python -c "import yaml; yaml.safe_load(open('configs/training.yaml')); print('training.yaml OK')"
          python -c "import json; data = json.load(open('data/metadata/fish_info.json')); print(f'fish_info.json OK — {len(data)} species')"

      - name: Check syntax
        run: |
          python -m py_compile \
            services/fish_ai/training/transforms.py \
            services/fish_ai/training/dataset.py \
            services/fish_ai/model/classifier.py \
            services/fish_ai/training/train.py \
            services/fish_ai/predictors/efficientnet.py \
            services/fish_ai/training/evaluate.py \
            services/fish_ai/training/utils.py \
            services/fish_ai/predictors/clip.py \
            services/fish_ai/service.py \
            services/gis_service/exif.py \
            services/gis_service/service.py \
            apps/omyfish_api/db/engine.py \
            apps/omyfish_api/repositories/observation_repository.py \
            apps/omyfish_api/repositories/species_repository.py \
            apps/omyfish_api/dependencies.py \
            apps/omyfish_api/routes/health.py \
            apps/omyfish_api/routes/species.py \
            apps/omyfish_api/routes/observations.py \
            apps/omyfish_api/main.py \
            apps/omyfish_web/main.py \
            research/scripts/download_data.py \
            shared/config.py \
            shared/events.py \
            shared/schemas/observation.py \
            shared/schemas/prediction.py
          echo "All files compile OK"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install CPU-only torch
        # Pre-satisfy torch/torchvision from the CPU index so the requirements
        # step doesn't pull the ~6 GB CUDA wheel stack (same trick as the
        # Space Dockerfile).
        run: pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.1.0" "torchvision>=0.16.0"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -v
