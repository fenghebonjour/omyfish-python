name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check token
        id: check
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret not set — skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: "3.11"

      - name: Upload to HuggingFace Spaces
        if: steps.check.outputs.skip != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install "huggingface_hub<1.18"
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path=".",
              repo_id="fenghebonjour/omyfish",
              repo_type="space",
              ignore_patterns=[
                  ".git/**", ".github/**",
                  "data/raw/**", "checkpoints/**", "outputs/**",
                  "logs/**", "wandb/**", "notebooks/**",
                  "**/__pycache__/**", "**/*.pyc",
              ],
          )
          print("Deploy complete")
          EOF
