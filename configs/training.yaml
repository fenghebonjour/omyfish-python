model:
  architecture: efficientnet_b3   # resnet50 | vit_base_patch16_224 vs. architecture: vit_base_patch16_224
  num_classes: 30                 # updated automatically from dataset at train time
  pretrained: true
  dropout: 0.3

training:
  epochs: 50
  batch_size: 32
  lr: 1.0e-3
  weight_decay: 1.0e-4
  early_stopping_patience: 10

data:
  image_size: 300
  train_split: 0.8
  num_workers: 4
  data_dir: data/raw

paths:
  checkpoints: checkpoints
  outputs: outputs

logging:
  use_wandb: false
  project: omyfish
