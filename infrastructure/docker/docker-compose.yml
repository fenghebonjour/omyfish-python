networks:
  # Created by ../omyfish-ai's compose — start that stack first so the
  # Timing tab has a bite-score service to talk to:
  #   cd ../../../omyfish-ai && docker compose up -d
  omyfish-shared:
    external: true

services:

  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: omyfish
      POSTGRES_USER: omyfish
      POSTGRES_PASSWORD: omyfish
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omyfish"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      # Host 8001 — host 8000 belongs to the shared omyfish-ai service
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://omyfish:omyfish@postgis:5432/omyfish
      ENV: production
    depends_on:
      postgis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://omyfish:omyfish@postgis:5432/omyfish
      ENV: production
      BITE_SERVICE_URL: http://ai-service:8000
    networks:
      - default
      - omyfish-shared
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  pgdata:
